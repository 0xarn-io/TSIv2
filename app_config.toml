# Application configuration for Main.py.
# PLC variable mappings live separately in plc_signals.toml.

[plc]
# AMS net_id and port are defined in plc_signals.toml ([ams] section).
vars_file = "plc_signals.toml"

[plc.publisher]
event_alias     = "sick.event"
live_alias      = "sick.live"
enable_alias    = "sick.enable"
enable_cycle_ms = 100

# Optional: increments a counter so the PLC can detect Python liveness.
# Comment out the [plc.heartbeat] table to disable entirely.
[plc.heartbeat]
alias     = "health.heartbeat"
period_ms = 1000

# Optional: publish robot status struct to the PLC. Requires [robot]
# below to be present too. Comment out either to disable.
[plc.robot_status]
status_alias = "robot.status"

# Optional: pair the active-recipe DINT (PLC writes) with the setpoints
# struct (Python writes). Requires [recipes] below. Comment out to disable.
[plc.recipe]
code_alias      = "recipe.code"
setpoints_alias = "recipe.setpoints"

# Optional: per-table active-size bridge. Each entry pairs a DINT id
# (PLC writes) with an ST_SizeSetpoints struct (Python writes) for one
# table in the sizes DB. Requires [sizes] below. Drop the array to disable.
[[plc.size_setpoints]]
table           = "cardboard"
code_alias      = "size.cardboard_id"
setpoints_alias = "size.cardboard_setpoints"

[[plc.size_setpoints]]
table           = "others"
code_alias      = "size.others_id"
setpoints_alias = "size.others_setpoints"

# Map PLC bool aliases (in plc_signals.toml) to camera names (below).
# Rising edge on the PLC bool fires a snapshot from that camera.
[[plc.camera_triggers]]
alias  = "camera.snap_entry"
camera = "entry"

[[plc.camera_triggers]]
alias  = "camera.snap_exit"
camera = "exit"

[scanner]
udp_port_a     = 2111
udp_port_b     = 2112
separation_m   = 2.45
belt_speed_mps = 0.254
belt_y         = -1.48

[ui]
refresh_hz = 10.0          # live-label update rate
host       = "0.0.0.0"
port       = 8080
title      = "Warak TSI"

[[cameras]]
name = "entry"
url  = "rtsp://192.168.125.50:554/profile1"

[[cameras]]
name = "exit"
url  = "rtsp://192.168.125.51:554/profile1"

# Optional: ABB OmniCore RWS monitor. Comment out [robot] to skip the
# whole module (no thread, no HTTP calls, no PLC writes).
[robot]
ip         = "192.168.125.1"
username   = "Admin"
password   = "robotics"
verify_ssl = false
poll_ms    = 2000
timeout_s  = 2.0

# ---- data layer (all optional) ----------------------------------------------
# Each section is independent. Comment one out and that store is simply not
# built — no code change needed. The DBOrchestrator skips missing sections.

[recipes]
db_path = "data/recipes.db"

[sizes]
db_path = "data/sizes.db"

[unit_log]
db_path   = "data/units.db"
keep_days = 0          # 0 = keep forever

[errors_log]
db_path   = "data/errors.db"
keep_days = 0

[snapshots]
root_dir  = "data/snapshots"
keep_days = 90
