[ams]
net_id = "169.254.115.139.1.1"
port = 851
# Set true to log every ADS read/write/notification (chatty; debugging only).
log_signals = false
# Per-call ADS response timeout. Bump if you see "timeout elapsed (1861)"
# on writes — often indicates a slow PLC scan or first-time symbol resolve.
timeout_ms = 5000

# Define UDTs once, reference them from vars
[structs.ST_SickEvent]
bNew         = "BOOL"
nLength      = "DINT"
nWidthMean   = "DINT"
nWidthMin    = "DINT"
nWidthMax    = "DINT"
nHeightMean  = "DINT"
nHeightMin   = "DINT"
nHeightMax   = "DINT"
nOffsetMean  = "DINT"
nOffsetMin   = "DINT"
nOffsetMax   = "DINT"
fDuration    = "REAL"
nSamples     = "DINT"

[structs.ST_SickLive]
nWidth  = "DINT"
nHeight = "DINT"
nOffset = "DINT"

[structs.ST_RobotStatus]
bReady       = "BOOL"
bMotorsOn    = "BOOL"
bAutoMode    = "BOOL"
bRunning     = "BOOL"
bGuardStop   = "BOOL"
bEStop       = "BOOL"
nSpeedRatio  = "DINT"

[structs.ST_SizeSetpoints]
nWidthMm  = "INT"
nLengthMm = "INT"

[structs.ST_RecipeSetpoints]
nXTopsheetLength = "DINT"
nXTopsheetWidth  = "DINT"
nXUnits          = "DINT"
nX1Pos           = "DINT"
nX2Pos           = "DINT"
nX3Pos           = "DINT"
bXFolding        = "BOOL"
nYTopsheetLength = "DINT"
nYTopsheetWidth  = "DINT"
nYUnits          = "DINT"
nY1Pos           = "DINT"
nY2Pos           = "DINT"
nY3Pos           = "DINT"
bYFolding        = "BOOL"
bWood            = "BOOL"
nWoodXPos        = "DINT"
nWoodYPos        = "DINT"

[groups.sick]
prefix = "pyADS"   # GVL with {attribute 'qualified_only'} → use bare name

[groups.sick.vars]
event   = { name = "SickEvent", type = "ST_SickEvent" }
live    = { name = "SickLive",  type = "ST_SickLive" }
enable  = { name = "bEnable",   type = "BOOL" }

[groups.camera]
prefix = "pyADS"

[groups.camera.vars]
snap_entry = { name = "bSnapEntry", type = "BOOL" }
snap_exit  = { name = "bSnapExit",  type = "BOOL" }

[groups.health]
prefix = "pyADS"

[groups.health.vars]
heartbeat = { name = "nHeartbeat", type = "UDINT" }

[groups.robot]
prefix = "pyADS"

[groups.robot.vars]
status = { name = "RobotStatus", type = "ST_RobotStatus" }

[groups.recipe]
prefix = "pyADS"

[groups.recipe.vars]
code      = { name = "nRecipeCode",     type = "DINT" }
setpoints = { name = "RecipeSetpoints", type = "ST_RecipeSetpoints" }

